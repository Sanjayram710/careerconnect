version: '3.8'

services:
  db:
    image: mysql:8.0
    container_name: placement_mysql_db
    restart: always
    environment:
      MYSQL_ROOT_PASSWORD: admin
      MYSQL_DATABASE: placement_portal
    ports:
      - "3306:3306"
    volumes:
      - mysql_data:/var/lib/mysql
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-u", "root", "-padmin"]
      timeout: 10s
      retries: 5
      start_period: 10s

  web:
    build: .
    container_name: placement_flask_web
    restart: always
    ports:
      - "8080:8080"
    environment:
      - SECRET_KEY=dev_secret_key_for_session_management_12345
      - DB_USER=root
      - DB_PASSWORD=admin
      - DB_HOST=db
      - DB_PORT=3306
      - DB_NAME=placement_portal
      - MAIL_SERVER=sandbox.smtp.mailtrap.io
      - MAIL_PORT=2525
      - MAIL_USERNAME=mock_username
      - MAIL_PASSWORD=mock_password
      - MAIL_USE_TLS=True
      - MAIL_USE_SSL=False
      - MAIL_DEFAULT_SENDER=noreply@placement.edu
      - LINKEDIN_CLIENT_ID=
      - LINKEDIN_CLIENT_SECRET=
      - LINKEDIN_REDIRECT_URI=http://localhost:8080/linkedin/callback
    depends_on:
      db:
        condition: service_healthy
    volumes:
      - .:/app
      - uploads_volume:/app/uploads

volumes:
  mysql_data:
  uploads_volume:
