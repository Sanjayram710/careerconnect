services:
  - type: web
    name: careerconnect
    runtime: python
    pythonVersion: "3.12.10"
    buildCommand: "pip install -r requirements.txt"
    startCommand: "gunicorn app:app"

    envVars:
      - key: SECRET_KEY
        generateValue: true

      - key: DATABASE_URL
        fromDatabase:
          name: careerconnect-db
          property: connectionString

      - key: MAIL_SERVER
        value: sandbox.smtp.mailtrap.io

      - key: MAIL_PORT
        value: "2525"

      - key: MAIL_USE_TLS
        value: "True"

      - key: MAIL_USE_SSL
        value: "False"

      - key: MAIL_USERNAME
        sync: false

      - key: MAIL_PASSWORD
        sync: false

      - key: GOOGLE_CLIENT_ID
        sync: false

      - key: GOOGLE_CLIENT_SECRET
        sync: false

    healthCheckPath: /
    autoDeploy: true

databases:
  - name: careerconnect-db
    databaseName: placement_portal
    plan: free
    ipAllowList: []