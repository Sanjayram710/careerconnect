services:
  - type: web
    name: careerconnect
    runtime: python
    buildCommand: "pip install -r requirements.txt"
    startCommand: "gunicorn app:app"
    envVars:
      - key: SECRET_KEY
        generateValue: true            # Render auto-generates a secure random value
      - key: DATABASE_URL
        fromDatabase:
          name: careerconnect-db
          property: connectionString
      - key: MAIL_SERVER
        value: sandbox.smtp.mailtrap.io
      - key: MAIL_PORT
        value: "2525"
      - key: MAIL_USE_TLS
        value: "True"
      - key: MAIL_USE_SSL
        value: "False"
      - key: MAIL_USERNAME
        sync: false                    # Set manually in Render dashboard
      - key: MAIL_PASSWORD
        sync: false                    # Set manually in Render dashboard
      - key: GOOGLE_CLIENT_ID
        sync: false                    # Set manually in Render dashboard
      - key: GOOGLE_CLIENT_SECRET
        sync: false                    # Set manually in Render dashboard
    healthCheckPath: /
    autoDeploy: true

databases:
  - name: careerconnect-db
    databaseName: placement_portal
    plan: free
    ipAllowList: []                    # Allow all Render internal connections
